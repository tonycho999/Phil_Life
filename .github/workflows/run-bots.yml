name: 🤖 뉴스 봇 자동 실행기

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # 🕒 한국 시간(KST) 기준 00:11, 12:11 실행 -> UTC 기준 15:11, 03:11
    - cron: '11 3,15 * * *'
    
    # 💡 만약 [필리핀 시간] 기준으로 00:11, 12:11에 실행하고 싶으시다면
    # 위 10번 줄을 지우고 아래 줄을 사용하세요! (UTC 기준 16:11, 04:11)
    # - cron: '11 4,16 * * *'

jobs:
  run-news-bots:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 환경 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 봇 스크립트 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python bot/main.py
