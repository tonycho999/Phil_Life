name: 🤖 뉴스 봇 테스트 실행기

on:
  # 1. 내가 원할 때 버튼을 눌러서 수동으로 실행하게 해주는 옵션
  workflow_dispatch:
  
  # 2. 정해진 시간마다 자동으로 실행 (매일 한국시간 오전 9시, 오후 6시)
  # cron은 UTC(세계표준시) 기준이므로 한국시간(KST)에서 9시간을 빼야 합니다.
#  schedule:
#    - cron: '0 0,9 * * *' 

jobs:
  run-news-bots:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 환경 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests groq python-dotenv supabase

      - name: 🚀 뉴스 봇 스크립트 실행
        env:
          # GitHub Secrets에 등록해둔 안전한 키들을 꺼내서 파이썬에 전달
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          python bot/main.py
