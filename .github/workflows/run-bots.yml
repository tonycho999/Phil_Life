name: 🤖 뉴스 봇 자동 실행기

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 0,9 * * *'

# ★ 깃허브 서버가 json 파일을 덮어쓰고 저장할 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  run-news-bots:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 환경 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 필요 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 봇 스크립트 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python bot/main.py

      # ★ 파이썬이 만든 json 파일을 깃허브 저장소에 영구적으로 자동 커밋(저장)
      - name: 💾 변경된 파일(JSON) 깃허브에 자동 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 봇 프로필 및 상태 자동 업데이트" && git push)
